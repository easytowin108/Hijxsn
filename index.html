<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #appFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="appFrame"></iframe>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDnM9ry5JreqjRXqQVUSiaBzudXuaAF-QI", 
            databaseURL: "https://send-message-b178e-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const frame = document.getElementById('appFrame');

        onValue(ref(db, 'redirect_config/content'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const content = data.trim();

            // Agar link hai toh src set karein, agar HTML hai toh srcdoc
            if (content.startsWith('http')) {
                frame.src = content;
            } else {
                frame.srcdoc = content;
            }
        });
    </script>
</body>
</html>
